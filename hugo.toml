baseURL = "https://markn2000.com"
locale = "ja-jp"
defaultContentLanguage = "ja"
title = "MarkN(まーくん)のホームページ"

enableGitInfo = true
enableRobotsTXT = true

[pagination]
  pagerSize = 12

[taxonomies]
  tag = "tags"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "JSON"]
  taxonomy = ["HTML"]
  term = ["HTML"]
  page = ["HTML"]

[params]
  description = "Resonite（レゾナイト）でVRプログラミングなどをしてツールやおもちゃを作っています。技術的な知見やTipsも発信。"
  og_image = "/images/ogp_default.webp"
  themeColor = "#2AA3D4"

  # プロフィール（ヒーロー・ヘッダーで使用）
  [params.profile]
    name = "MarkN(まーくん)"
    nameShort = "MarkN"
    intro = "Resonite(レゾナイト)でVRプログラミングなどをしてツールやおもちゃを作っています。技術的な知見やTipsも発信。"
    avatar = "/images/profile.webp"

  # SNS・外部リンク一覧（ヒーローに全種、ヘッダーは main=true の3つに絞る）
  [[params.sns]]
    name = "Twitter(X)"
    url = "https://x.com/markn_chansan"
    icon = "x"
    main = true
  [[params.sns]]
    name = "YouTube"
    url = "https://www.youtube.com/@marknvr"
    icon = "youtube"
    main = true
  [[params.sns]]
    name = "BOOTH"
    url = "https://markn.booth.pm/"
    icon = "booth"
  [[params.sns]]
    name = "ほしい物リスト"
    url = "https://www.amazon.co.jp/hz/wishlist/ls/NG17ACULTUZT?ref_=wl_share"
    icon = "gift"
  [[params.sns]]
    name = "依頼/お問い合わせ"
    url = "https://docs.google.com/forms/d/e/1FAIpQLSdl5UHhRc5Hq5Y_njMLCttSEqnHpWem_Ays6OpfYGGYOEIExg/viewform?usp=header"
    icon = "mail"
    main = true

  # トップページ構成
  [params.home]
    pickupCount = 4
    latestCount = 8
    # タグ棚（配列で増減・入替できる）
    [[params.home.shelves]]
      tag = "作ったもの"
      count = 4

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = true
  [markup.highlight]
    codeFences = true
    lineNos = false
    noClasses = false

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[related]
  threshold = 40
  includeNewer = true
  toLower = false

  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "date"
    weight = 10
    pattern = "2006"
