{{ define "main" }}
{{- $paginator := .Paginate .Pages -}}
<main>
  <div class="container">
    <div class="list-tools">
      <h1>{{ .Title }}</h1>
      {{ partial "tag-filter.html" (dict "current" .Title) }}
    </div>

    <div class="card-grid">
      {{ range $paginator.Pages }}{{ partial "card.html" . }}{{ end }}
    </div>

    {{ partial "pagination.html" (dict "paginator" $paginator) }}
  </div>
</main>
{{ end }}
