{{ define "main" }}
<main>
  <div class="container">
    <div class="list-tools">
      <h1>タグ一覧</h1>
      <div class="filter">
        {{- range site.Taxonomies.tags.ByCount -}}
        <a href="{{ .Page.RelPermalink }}">{{ .Page.Title }} {{ .Count }}</a>
        {{- end -}}
      </div>
    </div>
  </div>
</main>
{{ end }}
