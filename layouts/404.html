{{ define "main" }}
<main>
  <div class="article-wrap">
    <article class="article-main">
      <div class="article-surface head-card" style="text-align:center">
        <h1 style="font-size:2.6rem;margin:0 0 .3em;color:var(--accent-deep)">404</h1>
        <p style="margin:0 0 1em;font-weight:700">ページが見つかりません</p>
        <p style="color:var(--muted);font-size:.95rem">お探しのページは移動または削除されたか、URL が間違っている可能性があります。</p>
        <p style="margin-top:1.4em"><a class="tag" style="padding:8px 18px;font-size:.9rem" href="{{ "/" | relURL }}">ホームへ戻る</a></p>
      </div>
    </article>
  </div>
</main>
{{ end }}
